[alembic]
script_location = alembic
# Static fallback for offline-mode invocations only. At runtime, env.py
# overrides this with the resolved CUOPT_DATABASE_URL / CUOPT_ORACLE_* config.
sqlalchemy.url = sqlite+aiosqlite:///./cuopt.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
