name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, review_requested]
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install ruff pip-audit

      - name: Ruff bandit scan
        run: ruff check --select S src/ tests/

      - name: pip-audit
        run: pip-audit -r requirements.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Oracle UPL license headers
        run: python scripts/check_license_headers.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Unit tests with coverage
        run: |
          pytest tests/ -v \
            --ignore=tests/integration \
            --cov=cuopt_ev_routing_backend \
            --cov-report=term-missing \
            --cov-fail-under=80

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Integration tests
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: pytest tests/integration/ -v --tb=short

  build-and-push:
    runs-on: ubuntu-latest
    needs: [security-scan, lint, license-check, test, integration-test]
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      IMAGE_NAME: corrino-devops-repository/cuopt-ev-routing-backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Read version
        id: version
        run: echo "value=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCIR
        uses: oracle-actions/login-ocir@v1.3.0
        with:
          auth_token: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build backend image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }} \
            -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }} \
            -f Dockerfile .

      - name: Tag and push SHA + version
        run: |
          REGISTRY="iad.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}"
          docker tag ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }} \
            $REGISTRY/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }} \
            $REGISTRY/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
          docker push $REGISTRY/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          docker push $REGISTRY/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
